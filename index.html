*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);color:var(--dark);font-family:'Barlow',sans-serif;font-size:14px}
.hero{background:var(--blue);color:white;text-align:center;padding:1.6rem 2rem 1.2rem}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:3.2rem;font-weight:900;text-transform:uppercase;line-height:1}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-top:.35rem}
.stats-row{background:var(--dark);display:flex}
.stat-cell{flex:1;padding:.7rem 1rem;border-right:1px solid #222;text-align:center}.stat-cell:last-child{border-right:none}
.sc-label{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:#666;font-weight:700}
.sc-num{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:800;line-height:1.1;color:white}
.sc-num.g{color:#5fd45f}.sc-num.o{color:#f0b040}.sc-num.r{color:#f05050}
.controls{background:white;border-bottom:2px solid var(--border);padding:.65rem 1.5rem;display:flex;gap:.55rem;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.sw{position:relative}
.sw input{background:var(--off);border:1.5px solid var(--border);color:var(--dark);padding:.42rem .8rem .42rem 2rem;font-family:'Barlow',sans-serif;font-size:.82rem;width:220px;outline:none;border-radius:2px;transition:border-color .15s}
.sw input:focus{border-color:var(--blue)}.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.fbtn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:.4rem .75rem;border:1.5px solid var(--border);background:white;color:var(--mid);border-radius:2px;cursor:pointer;transition:all .12s}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fa{background:var(--blue);color:white;border-color:var(--blue)}
.fw{background:var(--green);color:white;border-color:var(--green)}
.fl{background:var(--orange);color:white;border-color:var(--orange)}
.fn{background:var(--red);color:white;border-color:var(--red)}
.ctrl-r{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.06em;color:var(--muted);font-weight:600;text-transform:uppercase}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 148px)}
.sidebar{background:white;border-right:2px solid var(--border);overflow-y:auto;height:100%}
.sb-all{padding:.55rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;background:var(--dark);color:white;border-bottom:2px solid var(--blue);user-select:none}
.sb-all:hover{background:var(--blue)}.sb-all.active{background:var(--blue)}
.sbcnt-w{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;background:rgba(255,255,255,.15);color:white;padding:.1rem .4rem;border-radius:10px;min-width:22px;text-align:center}
.sbg{border-bottom:1px solid var(--border)}
.sbg-hdr{padding:.5rem 1rem;cursor:pointer;display:flex;align-items:center;gap:.5rem;background:var(--off);border-bottom:1px solid #ececea;transition:background .1s;user-select:none}
.sbg-hdr:hover{background:var(--blue-pale)}.sbg-hdr.active{background:var(--blue);color:white}
.sbg-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;flex:1}
.sbg-cnt{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;background:rgba(0,0,0,.07);padding:.1rem .38rem;border-radius:8px;color:var(--mid)}
.sbg-hdr.active .sbg-cnt{background:rgba(255,255,255,.2);color:white}
.sbg-chev{font-size:.6rem;color:var(--muted);transition:transform .15s}.sbg-hdr.active .sbg-chev{color:rgba(255,255,255,.6)}

.sbg-items{display:none;background:white}.sbg-items.open{display:block}
.sbi{padding:.42rem 1rem .42rem 1.8rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f2f2f0;transition:background .1s;font-size:.76rem;color:var(--mid);user-select:none}
.sbi:hover{background:var(--blue-pale);color:var(--blue)}

table{width:100%;border-collapse:collapse}

const GROUPS=[
  {key:'alcohol',    label:'Alcohol Tinctuur',   rx:/^alcohol tinctuur|^tinctuur/i},
  {key:'bigbag',     label:'Bigbag Pallets',      rx:/^bigbag pallet/i},
  {key:'boonzaak',   label:'Boonzaak',            rx:/^boon(zaak|en)|^bonen/i},
  {key:'doppen',     label:'Doppen',              rx:/^doppen? pallet|^doppenpallet/i},
  {key:'dozen',      label:'Dozen',               rx:/^dozen |^bibs dozen/i},
  {key:'glas',       label:'Glas',                rx:/^glas /i},
  {key:'kruiden',    label:'Kruiden',             rx:/^kruiden/i},
  {key:'palletbox',  label:'Palletbox',           rx:/^palletbox/i},
  {key:'poeders',    label:'Poeders + ZZZ',       rx:/^poeder|^zzz|^zoet zout zuur/i},
  {key:'specerijen', label:'Specerijen',          rx:/^specerijen|^spec /i},
  {key:'vr',         label:'VR \u2014 Vriesruimte', rx:/^vr\d|^vr$/i},
  {key:'vv',         label:'VV',                  rx:/^vv$/i},
  {key:'etiketten',  label:'Etiketten',           rx:/^etiketten?$/i},
];

function getGK(loc){const g=GROUPS.find(g=>g.rx.test(loc));return g?g.key:null;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function fmt(v){if(v===0)return'0';return v.toLocaleString('nl-NL',{maximumFractionDigits:2});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let flt='all';
let sel=null;
let expanded=new Set();

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('sb').addEventListener('click',function(e){
    const t=e.target.closest('[data-action]');
    if(!t)return;
    const a=t.dataset.action;
    if(a==='all'){sel=null;render();}
    else if(a==='grp'){
      const k=t.dataset.key;
      if(expanded.has(k))expanded.delete(k);else expanded.add(k);
      sel={type:'group',key:k};
      render();
    }
    else if(a==='subloc'){sel={type:'subloc',gk:t.dataset.gk,loc:t.dataset.loc};render();}
    else if(a==='single'){sel={type:'single',loc:t.dataset.loc};render();}
  });
  document.getElementById('btn-all').addEventListener('click',()=>setFilter('all'));
  document.getElementById('btn-pos').addEventListener('click',()=>setFilter('pos'));
  document.getElementById('btn-zero').addEventListener('click',()=>setFilter('zero'));
  document.getElementById('btn-neg').addEventListener('click',()=>setFilter('neg'));
  document.getElementById('search').addEventListener('input',render);
});

function checkPw(){
  const input=document.getElementById('pw-input').value;
  if(input==='1NGv00rr@@d'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }else{
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

function setFilter(f){
  flt=f;
  document.getElementById('btn-all').className ='fbtn'+(f==='all' ?' fa':'');
  document.getElementById('btn-pos').className ='fbtn'+(f==='pos' ?' fw':'');
  document.getElementById('btn-zero').className='fbtn'+(f==='zero'?' fl':'');
  document.getElementById('btn-neg').className ='fbtn'+(f==='neg' ?' fn':'');
  render();
}

function mf(v){if(flt==='pos')return v>0;if(flt==='zero')return v===0;if(flt==='neg')return v<0;return true;}
function ms(item,q){
  if(!q)return true;
  const s=q.toLowerCase();
  return item.o.toLowerCase().includes(s)||item.r.toLowerCase().includes(s)||item.l.toLowerCase().includes(s)||(item.a&&item.a.toLowerCase().includes(s));
}

function buildData(q){
  const grouped={},singles={};
  for(const item of RAW){
    if(!mf(item.v)||!ms(item,q))continue;
    const gk=getGK(item.l);
    const loc=cap(item.l);
    if(gk){
      if(!grouped[gk])grouped[gk]={};
      if(!grouped[gk][loc])grouped[gk][loc]=[];
      grouped[gk][loc].push(item);
    }else{
      if(!singles[loc])singles[loc]=[];
      singles[loc].push(item);
    }
  }
  return{grouped,singles};
}

function renderTable(items,title){
  if(!items||items.length===0)return'';
  const hasNeg=items.some(i=>i.v<0);
  let rows='';
  for(const item of items){
    const cls=item.v>0?'pos':item.v<0?'neg':'zero';
    const opm=item.r?'<span class="opm">'+esc(item.r)+'</span>':'';
    const code=item.a?esc(item.a):'&#8212;';
    const tht=item.t&&item.t!=='x'&&item.t?esc(item.t):'<span style="color:var(--muted)">&#8212;</span>';
    rows+='<tr>'
      +'<td class="tdcode">'+code+'</td>'
      +'<td class="tdname">'+esc(item.o)+opm+'</td>'
      +'<td class="tdtht">'+tht+'</td>'
      +'<td class="tdq '+cls+'">'+fmt(item.v)+'</td>'
      +'<td class="tdu">'+(item.e?esc(item.e):'&#8212;')+'</td>'
      +'</tr>';
  }
  const negB=hasNeg?'<span class="tbl-badge tb-neg">&#9888; negatief</span>':'';
  const cntB='<span class="tbl-badge tb-items">'+items.length+' items</span>';
  const th=title?'<div class="tbl-title">'+esc(title)+cntB+negB+'</div>':'';
  return'<div class="tbl-wrap">'+th
    +'<table><thead><tr>'
    +'<th>Artikelcode</th>'
    +'<th>Omschrijving</th>'
    +'<th>THT</th>'
    +'<th class="tr">Voorraad</th>'
    +'<th class="tr">Eenheid</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function render(){
  const q=document.getElementById('search').value.trim();
  const{grouped,singles}=buildData(q);

  const tot=RAW.length;
  const pos=RAW.filter(i=>i.v>0).length;
  const zero=RAW.filter(i=>i.v===0).length;
  const neg=RAW.filter(i=>i.v<0).length;
  const locs=new Set(RAW.map(i=>i.l)).size;
  document.getElementById('sr').innerHTML=
    '<div class="stat-cell"><div class="sc-label">Items totaal</div><div class="sc-num">'+tot+'</div></div>'+
    '<div class="stat-cell"><div class="sc-label">Locaties</div><div class="sc-num">'+locs+'</div></div>'+
    '<div class="stat-cell"><div class="sc-label">Op voorraad</div><div class="sc-num g">'+pos+'</div></div>'+
    '<div class="stat-cell"><div class="sc-label">Leeg</div><div class="sc-num o">'+zero+'</div></div>'+
    '<div class="stat-cell"><div class="sc-label">Negatief</div><div class="sc-num r">'+neg+'</div></div>';

  let visCount=0;
  for(const gk in grouped)for(const loc in grouped[gk])visCount+=grouped[gk][loc].length;
  for(const loc in singles)visCount+=singles[loc].length;
  document.getElementById('ci').textContent=visCount+' items zichtbaar';

  let sb='';
  const allActive=!sel;
  sb+='<div class="sb-all'+(allActive?' active':'')+'" data-action="all"><span>Alle locaties</span><span class="sbcnt-w">'+tot+'</span></div>';

  for(const g of GROUPS){
    const rawCnt=RAW.filter(i=>getGK(i.l)===g.key).length;
    if(rawCnt===0)continue;
    const isExp=expanded.has(g.key);
    const isGrpAct=sel&&sel.type==='group'&&sel.key===g.key;
    sb+='<div class="sbg">';
    sb+='<div class="sbg-hdr'+(isGrpAct?' active':'')+(isExp?' expanded':'')+'" data-action="grp" data-key="'+esc(g.key)+'">'
      +'<span class="sbg-name">'+esc(g.label)+'</span>'
      +'<span class="sbg-cnt">'+rawCnt+'</span>'
      +'<span class="sbg-chev">&#9658;</span>'
      +'</div>';
    sb+='<div class="sbg-items'+(isExp?' open':'')+'">';
    const allSubs=[...new Set(RAW.filter(i=>getGK(i.l)===g.key).map(i=>cap(i.l)))].sort();
    for(const loc of allSubs){
      const cnt=RAW.filter(i=>cap(i.l)===loc&&getGK(i.l)===g.key).length;
      const isLocAct=sel&&sel.type==='subloc'&&sel.gk===g.key&&sel.loc===loc;
      sb+='<div class="sbi'+(isLocAct?' active':'')+'" data-action="subloc" data-gk="'+esc(g.key)+'" data-loc="'+esc(loc)+'">'
        +'<span>'+esc(loc)+'</span><span class="sbi-cnt">'+cnt+'</span>'
        +'</div>';
    }
    sb+='</div></div>';
  }

  const singleLocs=[...new Set(RAW.filter(i=>!getGK(i.l)).map(i=>cap(i.l)))].sort();
  if(singleLocs.length>0){
    sb+='<div class="sb-sec-lbl">Overige locaties</div>';
    for(const loc of singleLocs){
      const cnt=RAW.filter(i=>cap(i.l)===loc&&!getGK(i.l)).length;
      const isAct=sel&&sel.type==='single'&&sel.loc===loc;
      sb+='<div class="sbi-single'+(isAct?' active':'')+'" data-action="single" data-loc="'+esc(loc)+'">'
        +'<span>'+esc(loc)+'</span><span class="sbi-cnt">'+cnt+'</span>'
        +'</div>';
    }
  }
  document.getElementById('sb').innerHTML=sb;

  let ct='';
  if(!sel){
    for(const g of GROUPS){const gd=grouped[g.key];if(!gd)continue;for(const loc of Object.keys(gd).sort())ct+=renderTable(gd[loc],loc);}
    for(const loc of Object.keys(singles).sort())ct+=renderTable(singles[loc],loc);
  }else if(sel.type==='group'){
    const gd=grouped[sel.key];
    if(!gd)ct='<div class="empty">Geen resultaten voor deze groep</div>';
    else for(const loc of Object.keys(gd).sort())ct+=renderTable(gd[loc],loc);
  }else if(sel.type==='subloc'){
    const gd=grouped[sel.gk];
    const items=gd&&gd[sel.loc];
    ct=items?renderTable(items,sel.loc):'<div class="empty">Geen resultaten</div>';
  }else if(sel.type==='single'){
    const items=singles[sel.loc];
    ct=items?renderTable(items,sel.loc):'<div class="empty">Geen resultaten</div>';
  }
  if(!ct)ct='<div class="empty">Geen resultaten gevonden</div>';
  document.getElementById('ct').innerHTML=ct;
}
</script>
</body>
</html>
